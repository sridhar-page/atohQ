version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=file:/app/apps/api/prisma/dev.db
      - JWT_SECRET=your_secret_key
    volumes:
      - ./apps/api/prisma:/app/apps/api/prisma

networks:
  default:
    name: queue_service_backend_default
